stages:
  - check
  - build
  - deploy

variables:
  NODE_VERSION: '22.12'
  NPM_CONFIG_CACHE: '$CI_PROJECT_DIR/.npm'

.default_node_job: &default_node_job
  image: 'node:${NODE_VERSION}-bookworm-slim'
  cache:
    key: '${CI_COMMIT_REF_SLUG}'
    paths:
      - .npm/
  before_script:
    - |
      if [ -n "$NPM_TOKEN" ] || [ -n "$NPM_REGISTRY" ] || [ -n "$NPM_SCOPE" ]; then
        if [ -z "$NPM_TOKEN" ] || [ -z "$NPM_REGISTRY" ] || [ -z "$NPM_SCOPE" ]; then
          echo "NPM_TOKEN, NPM_REGISTRY, and NPM_SCOPE must be provided together."
          exit 1
        fi
        REG="$NPM_REGISTRY"
        case "$REG" in */) ;; *) REG="${REG}/" ;; esac
        HOST="${REG#https://}"
        HOST="${HOST#http://}"
        {
          echo "${NPM_SCOPE}:registry=${REG}"
          echo "//${HOST}:_authToken=${NPM_TOKEN}"
        } > .npmrc
      fi
    - npm ci

check:
  <<: *default_node_job
  stage: check
  script:
    - npm run type-check
    - npm run lint:ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

build:
  <<: *default_node_job
  stage: build
  script:
    - npm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

docker-build:
  stage: build
  image: dockerhub.timeweb.cloud/library/docker:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
  services:
    - name: docker:dind
      command: ['--host=tcp://0.0.0.0:2375', '--tls=false']
  variables:
    DOCKER_HOST: 'tcp://docker:2375'
    DOCKER_TLS_CERTDIR: ''
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - sed -i 's/https/http/' /etc/apk/repositories
    - |
      set -eu
      IMAGE_REGISTRY="${CI_REGISTRY_GITLAB:-${CI_REGISTRY:-}}"
      REGISTRY_USER="${CI_REGISTRY_USER_GITLAB:-${CI_REGISTRY_USER:-}}"
      REGISTRY_TOKEN="${CI_REGISTRY_TOKEN_GITLAB:-${CI_REGISTRY_PASSWORD:-}}"

      if [ -z "$IMAGE_REGISTRY" ] || [ -z "$REGISTRY_USER" ] || [ -z "$REGISTRY_TOKEN" ]; then
        echo "Docker registry variables are required: CI_REGISTRY_GITLAB/CI_REGISTRY, user, and token."
        exit 1
      fi

      echo "$REGISTRY_TOKEN" | docker login -u "$REGISTRY_USER" --password-stdin "$IMAGE_REGISTRY"
  script:
    - |
      set -eu
      IMAGE_REGISTRY="${CI_REGISTRY_GITLAB:-${CI_REGISTRY:-}}"
      IMAGE_REPOSITORY="${IMAGE_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}"
      IMAGE_TAG="${APP_IMAGE_TAG:-${CI_PROJECT_NAME}-app-${CI_COMMIT_SHA}}"
      BUILD_BASE_PATH="${VITE_BASE_PATH:-${K8S_BASE_PATH:-/}}"

      if [ -n "${VITE_BASE_PATH:-}" ] && [ -n "${K8S_BASE_PATH:-}" ] && [ "${VITE_BASE_PATH%/}" != "${K8S_BASE_PATH%/}" ]; then
        echo "VITE_BASE_PATH and K8S_BASE_PATH must point to the same public prefix."
        exit 1
      fi

      docker build \
        --pull \
        --network host \
        -t "${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
        --build-arg NODE_VERSION="$NODE_VERSION" \
        --build-arg NPM_REGISTRY="${NPM_REGISTRY:-}" \
        --build-arg NPM_SCOPE="${NPM_SCOPE:-}" \
        --build-arg NPM_TOKEN="${NPM_TOKEN:-}" \
        --build-arg VITE_API_BASE_URL="${VITE_API_BASE_URL:-}" \
        --build-arg VITE_BASE_PATH="$BUILD_BASE_PATH" \
        -f app.Dockerfile \
        .
      docker push "${IMAGE_REPOSITORY}:${IMAGE_TAG}"

deploy-prod:
  stage: deploy
  image: mirror.gcr.io/cylab/kubectl
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
  before_script:
    - |
      set -eu
      : "${K8S_SERVER:?K8S_SERVER is required.}"
      : "${K8S_TOKEN:?K8S_TOKEN is required as a base64-encoded token.}"
      : "${K8S_NAMESPACE:?K8S_NAMESPACE is required.}"
      : "${K8S_HOST:?K8S_HOST is required, for example app.example.com.}"
      : "${K8S_BASE_PATH:?K8S_BASE_PATH is required, for example /my-app.}"
      : "${CI_K8S_REGISTRY_SECRET_NAME:?CI_K8S_REGISTRY_SECRET_NAME is required.}"

      command -v envsubst >/dev/null || {
        echo "envsubst is required in the deploy image."
        exit 1
      }

      case "$K8S_BASE_PATH" in
        /*) ;;
        *)
          echo "K8S_BASE_PATH must start with /."
          exit 1
          ;;
      esac

      if [ "$K8S_BASE_PATH" != "/" ] && [ "${K8S_BASE_PATH%/}" != "$K8S_BASE_PATH" ]; then
        echo "K8S_BASE_PATH must not have a trailing slash."
        exit 1
      fi

      kubectl config set-cluster deploy-cluster --server="$K8S_SERVER" --insecure-skip-tls-verify
      kubectl config set-credentials gitlab --token="$(echo "$K8S_TOKEN" | base64 -d)"
      kubectl config set-context deploy-cluster --cluster=deploy-cluster --namespace="$K8S_NAMESPACE" --user=gitlab
      kubectl config use-context deploy-cluster
  script:
    - |
      set -eu
      IMAGE_REGISTRY="${CI_REGISTRY_GITLAB:-${CI_REGISTRY:-}}"
      IMAGE_REPOSITORY="${IMAGE_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}"
      IMAGE_TAG="${APP_IMAGE_TAG:-${CI_PROJECT_NAME}-app-${CI_COMMIT_SHA}}"
      APP_SLUG="${CI_PROJECT_PATH_SLUG:-$CI_PROJECT_NAME}"

      if [ -z "${K8S_APP_NAME:-}" ]; then
        K8S_APP_NAME="$(printf "%s" "$APP_SLUG" | cut -c1-50 | sed 's/-$//')"
      fi

      case "$K8S_APP_NAME" in
        "" | *[!a-z0-9-]* | -* | *-)
          echo "K8S_APP_NAME must be a Kubernetes DNS label up to 50 chars: lowercase letters, digits, and hyphens."
          exit 1
          ;;
      esac

      if [ "${#K8S_APP_NAME}" -gt 50 ]; then
        echo "K8S_APP_NAME must be 50 characters or fewer."
        exit 1
      fi

      export K8S_APP_NAME
      export K8S_IMAGE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
      export K8S_REPLICAS="${K8S_REPLICAS:-1}"
      export K8S_SERVICE_PORT="${K8S_SERVICE_PORT:-80}"
      export K8S_CONTAINER_PORT="${K8S_CONTAINER_PORT:-80}"

      envsubst < ./k8s/svc.yaml | kubectl apply -f -
      envsubst < ./k8s/ingress-route.yaml | kubectl apply -f -
      envsubst < ./k8s/deployment.yaml | kubectl apply -f -
