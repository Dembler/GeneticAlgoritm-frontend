apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${K8S_APP_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app: ${K8S_APP_NAME}
spec:
  replicas: ${K8S_REPLICAS}
  selector:
    matchLabels:
      app: ${K8S_APP_NAME}
  template:
    metadata:
      labels:
        app: ${K8S_APP_NAME}
    spec:
      imagePullSecrets:
        - name: ${CI_K8S_REGISTRY_SECRET_NAME}
      containers:
        - name: app
          image: ${K8S_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: ${K8S_CONTAINER_PORT}
      securityContext:
        fsGroup: 1001
